<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Miami Repair Map</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />  
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header id="site-header">
    <div class="header-content">
      <h1>Miami Repair Map</h1>
      <p>Find local fixers and keep items out of landfills. Help grow our circular economy! Site by Thomas Potts</p>
    </div>
  </header>

  <div id="map"></div>

  <div id="legend">
    <strong>Repair Categories</strong>
    <div class="legend-item"><i style="background: #e74c3c;"></i> Electronics</div>
    <div class="legend-item"><i style="background: #f39c12;"></i> Appliances</div>
    <div class="legend-item"><i style="background: #2b82cb;"></i> Bikes</div>
    <div class="legend-item"><i style="background: #9b59b6;"></i> Clothing</div>
    <div class="legend-item"><i style="background: #333333;"></i> Furniture</div> 
    <div class="legend-item"><i style="background: #2ecc71;"></i> Footwear</div>
    <div class="legend-item"><i style="background: #f1c40f;"></i> Jewelry</div>
    <div class="legend-item"><i style="background: #7f8c8d;"></i> Mobile Service</div> 
    <div class="legend-item"><i style="background: #f1f100;"></i> Other</div> 
  </div>

  <button id="add-btn" onclick="toggleForm()">+</button>

  <div id="form-popup" class="hidden">
    <div class="form-content">
      <span class="close" onclick="toggleForm()">&times;</span>
      <h2>Add Repair Service</h2>
      <p>Help the Miami community find local fixers.</p>

      <form id="repair-form">
        <input type="text" id="shopName" placeholder="Shop Name">
      
        <select id="shopCategory">
          <option value="" disabled selected>Select a Category</option>
          <option value="Electronics">Electronics</option>
          <option value="Appliances">Appliances</option>
          <option value="Bikes">Bikes</option>
          <option value="Clothing">Clothing</option>
          <option value="Furniture">Furniture</option>
          <option value="Footwear">Footwear</option>
          <option value="Jewelry">Jewelry</option>
          <option value="Other">Other</option>
        </select>

        <div style="margin: 10px 0; display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="isMobile" style="width: auto; margin: 0;">
          <label for="isMobile" style="font-size: 14px; color: #333;">This is a mobile/traveling service</label>
        </div>
        
        <input type="text" id="shopAddress" placeholder="Full Address">
        <input type="text" id="shopPhone" placeholder="Phone Number (Optional)">
        <input type="text" id="shopWebsite" placeholder="Website URL (Optional)">
      
        <div class="button-group">
          <button id="cancel-btn" type="button" onclick="toggleForm()">Back</button>
          <button id="submit-btn" type="button" onclick="submitService()">Submit</button>
        </div>
    </form> 
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script src="script.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

</body>
</html>
